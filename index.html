<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKH Cardio OPD Allocator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --sur: #1e293b;
  --sur2: #334155;
  --sur3: #475569;
  --bor: #475569;
  --acc: #60a5fa;
  --acc2: #38bdf8;
  --ok: #34d399;
  --warn: #fbbf24;
  --err: #f87171;
  --txt: #f8fafc;
  --dim: #94a3b8;
  --mid: #cbd5e1;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
header{padding:14px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:12px;background:rgba(30,41,59,.96);position:sticky;top:0;z-index:99}
.hi{width:38px;height:38px;background:linear-gradient(135deg,#1d4ed8,#0891b2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
header h1{font-family:'DM Serif Display',serif;font-size:16px}
header p{font-size:10px;color:var(--dim);font-family:'DM Mono',monospace}
.db{margin-left:auto;background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:4px 11px;font-family:'DM Mono',monospace;font-size:10px;color:var(--acc2);text-align:center;flex-shrink:0}
.db strong{display:block;font-size:13px;color:var(--txt)}
.sb{display:flex;align-items:center;gap:7px;padding:7px 18px;font-family:'DM Mono',monospace;font-size:11px;border-bottom:1px solid var(--bor);background:var(--sur)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 6px var(--warn);flex-shrink:0;transition:all 0.3s}
.tabs{display:flex;border-bottom:1px solid var(--bor);background:var(--sur);padding:0 18px;overflow-x:auto}
.tab{padding:10px 13px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.pg{display:none;padding:18px;max-width:860px;margin:0 auto}
.pg.on{display:block}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:13px;padding:20px;margin-bottom:14px}
.cbox{background:var(--sur2);border:1px solid var(--bor);border-radius:11px;padding:18px;margin-bottom:16px}
.rl{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.rd{font-family:'DM Serif Display',serif;font-size:26px;color:var(--acc);margin-bottom:3px}
.rr{font-family:'DM Mono',monospace;font-size:12px;color:var(--mid);margin-bottom:9px}
.dr{display:flex;gap:5px;flex-wrap:wrap}
.ds{display:flex;align-items:center;gap:5px;background:var(--sur3);border:1px solid var(--bor);border-radius:5px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mid)}
.ds .dn{color:var(--acc2);font-weight:500}
.tt{font-size:10px;color:var(--ok);background:rgba(16,185,129,.1);border-radius:3px;padding:1px 5px}
.rb{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bor);transition:all .3s}
.dot.on{background:var(--acc);transform:scale(1.5)}
label{display:block;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
input,select{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:10px 12px;color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:11px;transition:border-color .2s}
input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--sur2)}
.btn{width:100%;background:linear-gradient(135deg,#2563eb,#0891b2);border:none;border-radius:8px;padding:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.flash{display:none;margin-top:12px;padding:13px 16px;border-radius:9px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2)}
.flash.on{display:flex;align-items:center;gap:11px}
.fic{font-size:20px}
.ft strong{display:block;font-size:14px;color:var(--ok);font-family:'DM Serif Display',serif}
.ft span{font-size:12px;color:var(--mid);font-family:'DM Mono',monospace}
.lf{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.fb{background:var(--sur2);border:1px solid var(--bor);color:var(--mid);border-radius:6px;padding:5px 11px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px}
.fb.on{border-color:var(--acc);color:var(--acc)}
.lt{background:var(--sur);border:1px solid var(--bor);border-radius:11px;overflow:hidden}
.lh{display:grid;grid-template-columns:80px 1fr 1fr 1fr;padding:8px 13px;background:var(--sur2);border-bottom:1px solid var(--bor);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.lr{display:grid;grid-template-columns:80px 1fr 1fr 1fr;padding:10px 13px;border-bottom:1px solid var(--bor);font-size:12px}
.lr:last-child{border-bottom:none}
.lr:hover{background:var(--sur2)}
.lti{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim)}
.lm{font-family:'DM Mono',monospace;font-weight:500}
.lgx{font-size:11px;color:var(--mid)}
.rt{font-family:'DM Mono',monospace;font-size:10px;color:var(--acc2);background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:3px;padding:2px 5px;display:inline-block;margin-top:2px}
.es{padding:36px;text-align:center;color:var(--dim);font-family:'DM Mono',monospace;font-size:12px}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:9px}
.dc{background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:13px;cursor:pointer;transition:all .2s}
.dc:hover{border-color:var(--acc2)}
.dc.nx{border-color:var(--acc);background:rgba(59,130,246,.06)}
.dd{font-size:12px;font-weight:500;margin-bottom:2px}
.dr2{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:7px}
.dn2{font-family:'DM Serif Display',serif;font-size:26px}
.dc.nx .dn2{color:var(--acc)}
.dbr{height:3px;background:var(--bor);border-radius:2px;margin-top:5px;overflow:hidden}
.dfl{height:100%;background:var(--acc);border-radius:2px}
.dc.nx .dfl{background:var(--acc2)}
.lnx{font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;margin-top:5px}
.ac{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:20px;margin-bottom:13px}
.ac h3{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:13px}
.pi{background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:10px 13px;color:var(--txt);font-family:'DM Mono',monospace;font-size:15px;letter-spacing:5px;outline:none;width:100%;margin-bottom:9px;text-align:center}
.ub{background:var(--sur2);border:1px solid var(--bor);color:var(--mid);border-radius:7px;padding:9px 17px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px}
.er{font-size:11px;color:var(--err);font-family:'DM Mono',monospace;margin-top:3px}
.ac2{display:none}
.ac2.on{display:block}
.ar{display:flex;gap:9px;align-items:flex-end;margin-bottom:11px;flex-wrap:wrap}
.af{flex:1;min-width:140px}
.af input{margin-bottom:0}
.db3{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:var(--err);border-radius:7px;padding:9px 15px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px}
.ab2{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:var(--warn);border-radius:7px;padding:9px 15px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px}
.ib{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.15);border-radius:7px;padding:13px 15px;font-size:12px;color:var(--mid);font-family:'DM Mono',monospace;line-height:1.9}
.mo{display:none;position:fixed;inset:0;background:rgba(6,12,24,.87);z-index:200;align-items:center;justify-content:center;padding:18px}
.mo.on{display:flex}
.mb{background:var(--sur);border:1px solid var(--bor);border-radius:15px;width:100%;max-width:440px;max-height:78vh;display:flex;flex-direction:column}
.mh{padding:15px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.mh h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--acc)}
.mh p{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;margin-top:2px}
.mc{background:var(--sur2);border:1px solid var(--bor);color:var(--mid);border-radius:7px;padding:5px 11px;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px}
.mbody{padding:15px 18px;overflow-y:auto;flex:1}
.mct{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc2);margin-bottom:11px}
.mr{background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:10px 12px;margin-bottom:7px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.mf{font-family:'DM Mono',monospace;font-weight:600;font-size:13px}
.mg{font-size:12px;color:var(--mid);text-align:right}
.md{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace}
.mt2{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;text-align:right}
.me{text-align:center;padding:26px;color:var(--dim);font-family:'DM Mono',monospace;font-size:12px}
.opgate{text-align:center;padding:28px 18px}
.opgate .lk{font-size:30px;margin-bottom:11px}
.opgate h2{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:5px}
.opgate p{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;margin-bottom:18px;letter-spacing:1px}
</style>
</head>
<body>

<header>
  <div class="hi">🫀</div>
  <div>
    <h1>MKH Cardio OPD Allocator</h1>
    <p>MUBARAK AL-KABEER HOSPITAL</p>
  </div>
  <div class="db">
    <strong id="dayName">—</strong>
    <span id="dateStr">—</span>
  </div>
</header>

<div class="sb">
  <div class="sd" id="syncDot"></div>
  <span id="syncText" style="font-size:10px; color:var(--warn);">Connecting to database...</span>
</div>

<div class="tabs">
  <button class="tab on" onclick="goTab('ip',this)">Inpatient</button>
  <button class="tab" onclick="goTab('op',this)">Outpatient</button>
  <button class="tab" onclick="goTab('log',this)">Log</button>
  <button class="tab" onclick="goTab('dist',this)">Distribution</button>
  <button class="tab" onclick="goTab('adm',this)">Admin</button>
</div>

<div class="pg on" id="pg-ip">
  <div class="card">
    <div class="cbox">
      <div class="rl">Next Assigned Clinic</div>
      <div class="rd" id="nd">—</div>
      <div class="rr" id="nr">—</div>
      <div class="dr" id="ndays"></div>
    </div>
    <div class="rb" id="rb"></div>
    <div><label>File Number (6 Digits)</label>
    <input type="text" id="fi" placeholder="e.g. 123456" autocomplete="off" maxlength="6" inputmode="numeric"></div>
    <div><label>Registrar</label>
    <select id="rs" onchange="localStorage.setItem('mkh_last_reg', this.value)">
      <option value="">— Select —</option>
      <option>Dr. Rehan</option><option>Dr. Ramy</option><option>Dr. Badawy</option>
      <option>Dr. Sharkawy</option><option>Dr. Mostafa</option><option>Dr. Ibrahim</option>
      <option>Dr. Hadad</option><option>Dr. Emara</option><option>Dr. Rahim</option>
      <option>Dr. Mamdouh</option><option>Dr. Slam</option><option>Dr. Ezz</option>
      <option>Dr. R Gamal</option><option>Dr. Moghl</option><option>Dr. Darwish</option>
      <option>Dr. Omar</option><option>Dr. Sajid</option><option>Dr. Hamza</option>
      <option>Dr. Eyad</option><option>Dr. Mongy</option><option>Dr. Bahlol</option>
    </select></div>
    <button class="btn" onclick="doAssign()">Assign →</button>
    <div class="flash" id="fl">
      <div class="fic">✅</div>
      <div class="ft"><strong id="fd">—</strong><span id="fdt">—</span></div>
    </div>
  </div>
</div>

<div class="pg" id="pg-op">
  <div id="opgate" class="card opgate">
    <div class="lk">🔒</div>
    <h2>Outpatient Access</h2>
    <p>CLINIC CLERK &amp; ADMIN ONLY</p>
    <div style="max-width:230px;margin:0 auto">
      <input class="pi" type="password" id="opi" maxlength="4" placeholder="PIN">
      <button class="btn" onclick="clerkLogin()" style="margin-top:2px">Unlock</button>
      <div class="er" id="ope"></div>
    </div>
  </div>
  <div id="opc" style="display:none">
    <div class="card">
      <div class="cbox">
        <div class="rl">Next Available Clinic Today</div>
        <div class="rd" id="opd">—</div>
        <div class="rr" id="opr">—</div>
        <div class="dr" id="opinfo"></div>
      </div>
      <div id="opbars" style="margin-bottom:16px"></div>
      <div><label>Patient File Number (6 Digits)</label>
      <input type="text" id="opfi" placeholder="e.g. 123456" autocomplete="off" maxlength="6" inputmode="numeric">
      <div class="er" id="opfe"></div></div>
      <div><label>Assigned By</label>
      <select id="opcs">
        <option value="">— Select —</option>
        <option>Clinic Clerk</option>
      </select></div>
      <button class="btn" id="opbtn" onclick="doOpAssign()">Assign Outpatient →</button>
      <div class="flash" id="opfl">
        <div class="fic">✅</div>
        <div class="ft"><strong id="opfd">—</strong><span id="opfdt">—</span></div>
      </div>
    </div>
  </div>
</div>

<div class="pg" id="pg-log">
  <div class="lf">
    <button class="fb on" onclick="filterLog('all',this)">All</button>
    <button class="fb" onclick="filterLog('Sun',this)">Sun</button>
    <button class="fb" onclick="filterLog('Mon',this)">Mon</button>
    <button class="fb" onclick="filterLog('Tue',this)">Tue</button>
    <button class="fb" onclick="filterLog('Wed',this)">Wed</button>
    <button class="fb" onclick="filterLog('Thu',this)">Thu</button>
  </div>
  <div class="lt">
    <div class="lh"><div>Date</div><div>File No.</div><div>Doctor / Room</div><div>By</div></div>
    <div id="lb"><div class="es">No assignments yet.</div></div>
  </div>
</div>

<div class="pg" id="pg-dist">
  <div class="dg" id="dg"></div>
</div>

<div class="pg" id="pg-adm">
  <div class="ac">
    <h3>🔒 Admin Access</h3>
    <div id="apgate">
      <input class="pi" type="password" id="api" maxlength="4" placeholder="PIN">
      <button class="ub" onclick="adminLogin()">Unlock</button>
      <div class="er" id="ape"></div>
    </div>
    <div class="ac2" id="ac2">
      <div class="ar">
        <div class="af"><label>Set Rotation (1–19)</label>
        <input type="number" id="pri" min="1" max="19" placeholder="e.g. 3"></div>
        <button class="ab2" onclick="setPtr()">Apply</button>
      </div>
      <div class="ar">
        <div class="af"><label>Remove Fake Entry — File Number</label>
        <input type="text" id="dfi" placeholder="File number">
        <div class="er" id="dm"></div></div>
        <button class="db3" onclick="delEntry()">🗑 Remove</button>
      </div>
      <div class="ar"><button class="db3" onclick="resetAll()">⚠ Reset All</button></div>
      <div style="margin-bottom:11px">
        <div style="font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:7px">Export Weekly PDF</div>
        <div id="eb"></div>
      </div>
      <div class="ib" id="ib">—</div>
    </div>
  </div>
</div>

<div class="mo" id="mo">
  <div class="mb">
    <div class="mh">
      <div><h2 id="mt">—</h2><p id="ms">—</p></div>
      <button class="mc" onclick="closeMo()">Close</button>
    </div>
    <div class="mbody">
      <div class="mct" id="mc2">—</div>
      <div id="mbody"></div>
    </div>
  </div>
</div>

<script>
var CL=[
  {d:"Hisham",r:"Room 10",days:["Sun"]},
  {d:"Farag",r:"Room 8",days:["Mon"]},
  {d:"Ibrahim",r:"Room 10",days:["Tue"]},
  {d:"Hany",r:"Room 16",days:["Sun"]},
  {d:"Fahd",r:"Room 24",days:["Mon"]},
  {d:"Ali",r:"Room 11",days:["Wed"]},
  {d:"Nazanin",r:"Room 25",days:["Sun"]},
  {d:"Arab",r:"Room 25",days:["Tue"]},
  {d:"Ehab",r:"Room 25",days:["Mon"]},
  {d:"Maged",r:"Room 20",days:["Sun"]},
  {d:"Fawzy",r:"Room 20",days:["Wed"]},
  {d:"Ashraf",r:"Room 20",days:["Thu"]},
  {d:"Akmal",r:"Room 10",days:["Mon"]},
  {d:"Zaher",r:"Room 20",days:["Tue"]},
  {d:"Shafie",r:"Room 25",days:["Thu"]},
  {d:"Hisham",r:"Room 8",days:["Tue"]},
  {d:"Farag",r:"Room 10",days:["Wed"]},
  {d:"Ibrahim",r:"Room 13",days:["Thu"]},
  {d:"Maged",r:"Room 11",days:["Tue"]}
];
var AP="2025",CP="2026",adm=false,clk=false,lf="all";

function loadState(){try{var s=localStorage.getItem("mkh_v3");if(s){var o=JSON.parse(s);if(o&&o.logs)return o}}catch(e){}return{ptr:0,logs:[],oplogs:[]}}

function save(){
  try{localStorage.setItem("mkh_v3",JSON.stringify(window.S))}catch(e){}
  if(window.cloudSync) window.cloudSync(window.S);
}

window.S = loadState();

// Initialize the saved registrar memory
var savedReg = localStorage.getItem('mkh_last_reg');
if(savedReg) {
  var regSelect = document.getElementById('rs');
  if(Array.from(regSelect.options).some(function(opt){return opt.value === savedReg})) {
    regSelect.value = savedReg;
  }
}

function tn(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()]}
function nt(){return new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
function nd(){return new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})}

function smartIdx(){
  var cnt=new Array(CL.length).fill(0);
  window.S.logs.forEach(function(e){if(e.si!=null)cnt[e.si]++});
  window.S.oplogs.forEach(function(e){if(e.si!=null)cnt[e.si]++});
  var ds={};CL.forEach(function(c,i){if(!ds[c.d])ds[c.d]=[];ds[c.d].push(i)});
  var sec=new Set();Object.values(ds).forEach(function(a){if(a.length>1)sec.add(a[a.length-1])});
  var fst=[];for(var x=0;x<CL.length;x++){if(!sec.has(x))fst.push(x)}
  var mn=Math.min.apply(null,fst.map(function(i){return cnt[i]}));
  for(var o=0;o<CL.length;o++){var i=(window.S.ptr+o)%CL.length;if(!sec.has(i)&&cnt[i]===mn)return i}
  var sarr=Array.from(sec);
  if(sarr.length){var ms=Math.min.apply(null,sarr.map(function(i){return cnt[i]}));for(var o2=0;o2<CL.length;o2++){var i2=(window.S.ptr+o2)%CL.length;if(sec.has(i2)&&cnt[i2]===ms)return i2}}
  return window.S.ptr%CL.length;
}

window.rAll = function(){rH();rNext();rRot();rDist();rLog(lf);rAdmin()}

function rH(){
  var d=new Date();
  document.getElementById("dayName").textContent=tn();
  document.getElementById("dateStr").textContent=d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}

function rNext(){
  var i=smartIdx(),c=CL[i],t=tn();
  document.getElementById("nd").textContent="Dr. "+c.d;
  document.getElementById("nr").textContent=c.r;
  var el=document.getElementById("ndays");el.innerHTML="";
  c.days.forEach(function(day){
    var d=document.createElement("div");d.className="ds";
    d.innerHTML='<span class="dn">'+day+"</span>"+(day===t?'<span class="tt">TODAY</span>':"");
    el.appendChild(d);
  });
}

function rRot(){
  var b=document.getElementById("rb");b.innerHTML="";
  var si=smartIdx();
  CL.forEach(function(_,i){var d=document.createElement("div");d.className="dot"+(i===si?" on":"");b.appendChild(d)});
}

function rDist(){
  var g=document.getElementById("dg");g.innerHTML="";
  var cnt=new Array(CL.length).fill(0);
  window.S.logs.forEach(function(e){if(e.si!=null)cnt[e.si]++});
  window.S.oplogs.forEach(function(e){if(e.si!=null)cnt[e.si]++});
  var mx=Math.max.apply(null,cnt.concat([1]));
  var si=smartIdx();
  CL.forEach(function(c,i){
    var p=Math.round(cnt[i]/mx*100);
    var cd=document.createElement("div");cd.className="dc"+(i===si?" nx":"");
    cd.innerHTML='<div class="dd">Dr. '+c.d+'</div><div class="dr2">'+c.r+" · "+c.days.join(",")+'</div><div class="dn2">'+cnt[i]+'</div><div class="dbr"><div class="dfl" style="width:'+p+'%"></div></div>'+(adm?"":'<div class="lnx">🔒 admin only</div>');
    (function(idx){cd.onclick=function(){openMo(idx)}})(i);
    g.appendChild(cd);
  });
}

function rLog(f){
  lf=f;var b=document.getElementById("lb");
  var e=window.S.logs.slice().reverse();
  if(f!=="all")e=e.filter(function(x){return(x.cd||x.day)===f});
  if(!e.length){b.innerHTML='<div class="es">No assignments found.</div>';return}
  b.innerHTML="";
  e.forEach(function(x){
    var r=document.createElement("div");r.className="lr";
    r.innerHTML='<div class="lti">'+(x.ad||"")+'<br><span style="font-size:10px">'+(x.time||"")+"</span></div>"
      +'<div class="lm">'+(x.fn||"—")+"</div>"
      +"<div>Dr. "+x.doc+'<br><span class="rt">'+x.room+" · "+(x.cd||x.day||"")+"</span></div>"
      +'<div class="lgx">'+(x.reg||x.clerk||"")+"</div>";
    b.appendChild(r);
  });
}

function rAdmin(){
  var si=smartIdx();
  document.getElementById("ib").innerHTML="Next: <b style='color:var(--txt)'>Dr. "+CL[si].d+" · "+CL[si].r+"</b><br>Inpatient: <b style='color:var(--txt)'>"+window.S.logs.length+"</b><br>Outpatient: <b style='color:var(--txt)'>"+window.S.oplogs.length+"</b>";
}

function doAssign(){
  var fn=document.getElementById("fi").value.trim();
  var reg=document.getElementById("rs").value;
  if(!/^\d{6}$/.test(fn)){alert("File number must be exactly 6 digits.");return}
  if(!reg){alert("Select registrar.");return}
  
  // The Safety Net Confirmation Check
  if(!confirm("Please confirm:\n\nAssign File " + fn + " under the name " + reg + "?")){return}

  var i=smartIdx(),c=CL[i];
  window.S.logs.push({fn:fn,reg:reg,doc:c.d,room:c.r,si:i,day:tn(),cd:c.days[0],ad:nd(),time:nt(),ts:Date.now()});
  window.S.ptr++;save();
  document.getElementById("fd").textContent="→ Dr. "+c.d+" · "+c.r;
  document.getElementById("fdt").textContent="File "+fn+" · "+reg+" · "+nt();
  document.getElementById("fl").className="flash on";
  document.getElementById("fi").value="";
  // Notice we no longer clear the dropdown so it stays ready for the next patient
  window.rAll();
}
document.getElementById("fi").addEventListener("keydown",function(e){if(e.key==="Enter")doAssign()});

function todayCL(){var t=tn();return CL.map(function(c,i){return Object.assign({},c,{idx:i})}).filter(function(c){return c.days.indexOf(t)!==-1})}
function cCnt(i){return window.S.logs.filter(function(e){return e.si===i}).length+window.S.oplogs.filter(function(e){return e.si===i}).length}
function bestCL(){var tc=todayCL();if(!tc.length)return null;return tc.reduce(function(l,c){return cCnt(c.idx)<cCnt(l.idx)?c:l},tc[0])}

function rOp(){
  var tc=todayCL(),t=tn(),closed=!tc.length||t==="Fri"||t==="Sat";
  if(closed){
    document.getElementById("opd").textContent="No outpatient today";
    document.getElementById("opr").textContent="Resumes Sunday";
    document.getElementById("opinfo").innerHTML="";
    document.getElementById("opbars").innerHTML='<div style="font-size:12px;color:var(--dim);font-family:DM Mono,monospace;padding:6px 0">Outpatient runs Sun–Thu only.</div>';
    document.getElementById("opbtn").disabled=true;return;
  }
  document.getElementById("opbtn").disabled=false;
  var best=bestCL();
  if(best){
    document.getElementById("opd").textContent="Dr. "+best.d;
    document.getElementById("opr").textContent=best.r;
    document.getElementById("opinfo").innerHTML='<div class="ds"><span class="dn">'+t+'</span><span class="tt">TODAY</span></div><div class="ds"><span class="dn">'+cCnt(best.idx)+"</span><span>patients</span></div>";
  }
  var bars=document.getElementById("opbars");bars.innerHTML="";
  var mx=Math.max.apply(null,tc.map(function(c){return cCnt(c.idx)}).concat([1]));
  tc.forEach(function(c){
    var cnt=cCnt(c.idx),p=Math.round(cnt/mx*100),ib=best&&c.idx===best.idx;
    var ac=ib?"var(--acc)":"var(--mid)",bc=ib?"var(--acc)":"var(--bor)";
    var b=document.createElement("div");b.style.cssText="display:grid;grid-template-columns:105px 1fr 26px;gap:7px;align-items:center;margin-bottom:9px";
    b.innerHTML='<div style="font-size:11px;font-family:DM Mono,monospace;color:'+ac+'">Dr. '+c.d+'<br><span style="font-size:10px;color:var(--dim)">'+c.r+"</span></div>"
      +'<div style="height:5px;background:var(--bor);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+p+"%;background:"+bc+";border-radius:3px\"></div></div>"
      +'<div style="font-size:12px;font-family:DM Serif Display,serif;color:'+ac+'">'+cnt+"</div>";
    bars.appendChild(b);
  });
}

function clerkLogin(){
  var v=document.getElementById("opi").value;
  if(v===CP||v===AP){clk=true;document.getElementById("opgate").style.display="none";document.getElementById("opc").style.display="block";rOp()}
  else{document.getElementById("ope").textContent="Incorrect PIN."}
}

function doOpAssign(){
  var fn=document.getElementById("opfi").value.trim();
  var cl=document.getElementById("opcs").value;
  var err=document.getElementById("opfe");err.textContent="";
  if(!/^\d{6}$/.test(fn)){err.textContent="File number must be exactly 6 digits.";return}
  if(!cl){alert("Select assigned by.");return}
  if(window.S.logs.find(function(e){return e.fn===fn})||window.S.oplogs.find(function(e){return e.fn===fn})){err.textContent="File "+fn+" already assigned. Possible duplicate.";return}
  if(tn()==="Fri"||tn()==="Sat"){alert("Outpatient runs Sun–Thu only.");return}
  
  if(!confirm("Please confirm:\n\nAssign Outpatient File " + fn + " under the name " + cl + "?")){return}

  var best=bestCL();if(!best)return;
  window.S.oplogs.push({fn:fn,clerk:cl,doc:best.d,room:best.r,si:best.idx,cd:tn(),ad:nd(),time:nt(),ts:Date.now()});
  save();
  document.getElementById("opfd").textContent="→ Dr. "+best.d+" · "+best.r;
  document.getElementById("opfdt").textContent="File "+fn+" · "+cl+" · "+nt();
  document.getElementById("opfl").className="flash on";
  document.getElementById("opfi").value="";
  rOp();rDist();
}

function goTab(id,btn){
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on")});
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("on")});
  document.getElementById("pg-"+id).classList.add("on");btn.classList.add("on");
  if(id==="op"&&!clk){document.getElementById("opgate").style.display="block";document.getElementById("opc").style.display="none"}
  if(id==="op"&&clk)rOp();
  if(id==="dist")rDist();
  if(id==="adm"){rAdmin();rExport()}
}

function filterLog(f,btn){
  document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on")});
  btn.classList.add("on");rLog(f);
}

function adminLogin(){
  if(document.getElementById("api").value===AP){
    document.getElementById("ac2").classList.add("on");
    document.getElementById("apgate").style.display="none";
    adm=true;rAdmin();rDist();rExport();
  }else{document.getElementById("ape").textContent="Incorrect PIN."}
}

function setPtr(){
  var v=parseInt(document.getElementById("pri").value);
  if(isNaN(v)||v<1||v>CL.length){alert("Enter 1–19");return}
  window.S.ptr=v-1;save();window.rAll();alert("Set to Dr. "+CL[(v-1)%CL.length].d);
}

function resetAll(){
  if(!confirm("Reset ALL data?"))return;
  window.S={ptr:0,logs:[],oplogs:[]};save();window.rAll();alert("Done.");
}

function delEntry(){
  var fn=document.getElementById("dfi").value.trim();
  var m=document.getElementById("dm");m.textContent="";m.style.color="var(--err)";
  if(!fn){m.textContent="Enter file number.";return}
  var ipi=window.S.logs.findIndex(function(e){return e.fn===fn});
  var opi=window.S.oplogs.findIndex(function(e){return e.fn===fn});
  if(ipi===-1&&opi===-1){m.textContent="File "+fn+" not found.";return}
  var isIP=ipi!==-1,ent=isIP?window.S.logs[ipi]:window.S.oplogs[opi];
  if(!confirm("Remove entry for file "+fn+" (Dr. "+ent.doc+")?"))return;
  if(isIP){window.S.logs.splice(ipi,1);window.S.ptr=Math.max(0,window.S.ptr-1)}else{window.S.oplogs.splice(opi,1)}
  save();m.style.color="var(--ok)";m.textContent="Removed. Dr. "+ent.doc+" gets next patient.";
  document.getElementById("dfi").value="";window.rAll();
}

function openMo(idx){
  if(!adm){alert("Admin access required.");return}
  var c=CL[idx];
  var pts=window.S.logs.filter(function(e){return e.si===idx}).map(function(p){return Object.assign({tp:"IP"},p)})
    .concat(window.S.oplogs.filter(function(e){return e.si===idx}).map(function(p){return Object.assign({tp:"OP"},p)}))
    .sort(function(a,b){return b.ts-a.ts});
  document.getElementById("mt").textContent="Dr. "+c.d;
  document.getElementById("ms").textContent=c.r+" · "+c.days.join(", ");
  document.getElementById("mc2").textContent=pts.length+" patient(s) assigned";
  var b=document.getElementById("mbody");
  if(!pts.length){b.innerHTML='<div class="me">No patients yet.</div>'}
  else{b.innerHTML="";pts.forEach(function(p){var r=document.createElement("div");r.className="mr";r.innerHTML='<div class="mf">'+(p.tp==="OP"?"🚶":"📋")+" "+(p.fn||"—")+'</div><div class="mg">'+(p.reg||p.clerk||"")+'</div><div class="md">'+(p.ad||"")+'</div><div class="mt2">'+(p.time||"")+"</div>";b.appendChild(r)})}
  document.getElementById("mo").classList.add("on");
}
function closeMo(){document.getElementById("mo").classList.remove("on")}

function wkLabel(ts){var d=new Date(ts),dy=d.getDay(),diff=d.getDate()-dy+(dy===0?-6:1),m=new Date(d.setDate(diff));return m.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}

function rExport(){
  var btn=document.getElementById("eb");if(!btn)return;
  var all=window.S.logs.map(function(e){return Object.assign({tp:"Inpatient"},e)}).concat(window.S.oplogs.map(function(e){return Object.assign({tp:"Outpatient"},e)}));
  if(!all.length){btn.innerHTML='<span style="font-size:12px;color:var(--dim);font-family:DM Mono,monospace">No data yet</span>';return}
  var wks={};all.forEach(function(e){var w=wkLabel(e.ts);if(!wks[w])wks[w]=[];wks[w].push(e)});
  btn.innerHTML="";
  Object.keys(wks).forEach(function(w){
    var b=document.createElement("button");b.className="ab2";b.style.cssText="margin-right:7px;margin-bottom:7px";b.textContent="📊 "+w;
    (function(wk,en){b.onclick=function(){exportPDF(wk,en)}})(w,wks[w]);btn.appendChild(b);
  });
}

function exportPDF(wl,entries){
  var s=entries.slice().sort(function(a,b){return a.ts-b.ts});
  var rows="";s.forEach(function(e){var bg=e.tp==="Inpatient"?"badge-ip":"badge-op";rows+="<tr><td>"+(e.ad||"")+"</td><td>"+(e.time||"")+"</td><td><span class='"+bg+"'>"+(e.tp||"")+"</span></td><td><b>"+(e.fn||"N/A")+"</b></td><td>Dr. "+(e.doc||"")+"</td><td>"+(e.room||"")+"</td><td>"+(e.cd||e.day||"")+"</td><td>"+(e.reg||e.clerk||"")+"</td></tr>"});

var w=window.open("","_blank");w.document.write(h);w.document.close();
}

window.rAll();
</script>
