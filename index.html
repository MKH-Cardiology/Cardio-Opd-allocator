<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKH Cardio OPD Allocator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a; --sur: #1e293b; --sur2: #334155; --sur3: #475569; --bor: #475569;
  --acc: #60a5fa; --acc2: #38bdf8; --ok: #34d399; --warn: #fbbf24; --err: #f87171;
  --txt: #f8fafc; --dim: #94a3b8; --mid: #cbd5e1;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
header{padding:14px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:12px;background:rgba(30,41,59,.96);position:sticky;top:0;z-index:99}
.hi{width:38px;height:38px;background:linear-gradient(135deg,#1d4ed8,#0891b2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
header h1{font-family:'DM Serif Display',serif;font-size:16px}
header p{font-size:10px;color:var(--dim);font-family:'DM Mono',monospace}
.db{margin-left:auto;background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:4px 11px;font-family:'DM Mono',monospace;font-size:10px;color:var(--acc2);text-align:center}
.db strong{display:block;font-size:13px;color:var(--txt)}
.sb{display:flex;align-items:center;gap:7px;padding:7px 18px;font-family:'DM Mono',monospace;font-size:11px;border-bottom:1px solid var(--bor);background:var(--sur)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 6px var(--warn);transition:all 0.3s}
.tabs{display:flex;border-bottom:1px solid var(--bor);background:var(--sur);padding:0 18px;overflow-x:auto}
.tab{padding:12px 13px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border:none;white-space:nowrap}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.pg{display:none;padding:18px;max-width:860px;margin:0 auto}
.pg.on{display:block}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:13px;padding:20px;margin-bottom:14px}
.cbox{background:var(--sur2);border:1px solid var(--bor);border-radius:11px;padding:18px;margin-bottom:16px}
.rl{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.rd{font-family:'DM Serif Display',serif;font-size:26px;color:var(--acc);margin-bottom:3px}
.rr{font-family:'DM Mono',monospace;font-size:12px;color:var(--mid);margin-bottom:9px}
.dr{display:flex;gap:5px;flex-wrap:wrap}
.ds{display:flex;align-items:center;gap:5px;background:var(--sur3);border:1px solid var(--bor);border-radius:5px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:11px}
.tt{font-size:10px;color:var(--ok);background:rgba(16,185,129,.1);border-radius:3px;padding:1px 5px}
.rb{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bor);transition:all .3s}
.dot.on{background:var(--acc);transform:scale(1.5)}
label{display:block;font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:11px;color:var(--txt);font-family:'DM Mono',monospace;font-size:14px;outline:none;margin-bottom:11px}
.btn{width:100%;background:linear-gradient(135deg,#2563eb,#0891b2);border:none;border-radius:8px;padding:12px;color:#fff;font-weight:600;cursor:pointer;margin-bottom:5px}
.flash{display:none;margin-top:12px;padding:13px;border-radius:9px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2)}
.flash.on{display:flex;align-items:center;gap:11px}
.lt{background:var(--sur);border:1px solid var(--bor);border-radius:11px;overflow:hidden}
.lh{display:grid;grid-template-columns:80px 1fr 1fr 1fr;padding:8px 13px;background:var(--sur2);border-bottom:1px solid var(--bor);font-family:'DM Mono',monospace;font-size:10px;color:var(--dim)}
.lr{display:grid;grid-template-columns:80px 1fr 1fr 1fr;padding:10px 13px;border-bottom:1px solid var(--bor);font-size:12px}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
.dc{background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:13px;cursor:pointer}
.dc.nx{border-color:var(--acc);background:rgba(59,130,246,.06)}
.dd{font-size:12px;font-weight:500;margin-bottom:2px}
.dn2{font-family:'DM Serif Display',serif;font-size:26px}
.pi{background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:12px;color:var(--txt);font-family:'DM Mono',monospace;font-size:15px;text-align:center;width:100%;margin-bottom:9px}
.mo{display:none;position:fixed;inset:0;background:rgba(6,12,24,.9);z-index:200;align-items:center;justify-content:center;padding:18px}
.mo.on{display:flex}
.mb{background:var(--sur);border:1px solid var(--bor);border-radius:15px;width:100%;max-width:440px;max-height:80vh;display:flex;flex-direction:column}
.mh{padding:15px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.mbody{padding:15px 18px;overflow-y:auto;flex:1}
.mr{background:var(--sur2);border:1px solid var(--bor);border-radius:7px;padding:10px;margin-bottom:7px;display:grid;grid-template-columns:1fr 1fr;font-size:12px}
</style>
</head>
<body>

<header>
  <div class="hi">🫀</div>
  <div><h1>MKH Cardio OPD Allocator</h1><p>MUBARAK AL-KABEER HOSPITAL</p></div>
  <div class="db"><strong id="dayName">—</strong><span id="dateStr">—</span></div>
</header>

<div class="sb"><div class="sd" id="syncDot"></div><span id="syncText">Connecting to database...</span></div>

<div class="tabs">
  <button class="tab on" onclick="goTab('ip',this)">Inpatient</button>
  <button class="tab" onclick="goTab('op',this)">Outpatient</button>
  <button class="tab" onclick="goTab('log',this)">Log</button>
  <button class="tab" onclick="goTab('dist',this)">Distribution</button>
  <button class="tab" onclick="goTab('adm',this)">Admin</button>
</div>

<div class="pg on" id="pg-ip">
  <div class="card">
    <div class="cbox"><div class="rl">Next Assigned Clinic</div><div class="rd" id="nd">—</div><div class="rr" id="nr">—</div><div class="dr" id="ndays"></div></div>
    <div class="rb" id="rb"></div>
    <label>File Number (6 Digits)</label><input type="text" id="fi" maxlength="6" inputmode="numeric">
    <label>Registrar PIN</label><input type="password" id="rpin" maxlength="4" inputmode="numeric">
    <button class="btn" onclick="doAssign()">Assign →</button>
    <div class="flash" id="fl"><div class="ft"><strong id="fd">—</strong><span id="fdt">—</span></div></div>
  </div>
</div>

<div class="pg" id="pg-op">
  <div id="opgate" class="card" style="text-align:center"><label>CLERK ACCESS PIN</label><input class="pi" type="password" id="opi" maxlength="4"><button class="btn" onclick="clerkLogin()">Unlock</button></div>
  <div id="opc" style="display:none">
    <div class="card"><div class="cbox"><div class="rl">Next Available Clinic Today</div><div class="rd" id="opd">—</div><div class="rr" id="opr">—</div></div>
    <label>Patient File Number (6 Digits)</label><input type="text" id="opfi" maxlength="6" inputmode="numeric">
    <button class="btn" onclick="doOpAssign()">Assign Outpatient →</button></div>
  </div>
</div>

<div class="pg" id="pg-log"><div class="lt"><div class="lh"><div>Date</div><div>File</div><div>Room</div><div>By</div></div><div id="lb"></div></div></div>

<div class="pg" id="pg-dist"><div class="dg" id="dg"></div></div>

<div class="pg" id="pg-adm">
  <div class="card" id="apgate" style="text-align:center"><label>ADMIN PIN</label><input class="pi" type="password" id="api" maxlength="4"><button class="btn" onclick="adminLogin()">Unlock</button></div>
  <div id="ac2" style="display:none">
    <div class="card"><h3>Admin Controls</h3>
      <button class="btn" style="margin-top:10px" onclick="exportWeekly()">📊 Weekly General PDF</button>
      <button class="btn" style="background:#f87171;margin-top:10px" onclick="resetAll()">⚠ Reset All Data</button>
    </div>
  </div>
</div>

<div class="mo" id="mo"><div class="mb"><div class="mh"><h2 id="mt">—</h2><button onclick="closeMo()">Close</button></div>
<div class="mbody"><div id="mc2" style="font-size:12px;color:var(--acc2);margin-bottom:10px"></div><div id="mbody"></div><div id="mprint"></div></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAT7Y3jWM4ix7I5cM4vKsHIJRaZZ6AZ9yI",
  authDomain: "cardio-opd.firebaseapp.com",
  databaseURL: "https://cardio-opd-default-rtdb.firebaseio.com",
  projectId: "cardio-opd",
  storageBucket: "cardio-opd.firebasestorage.app",
  appId: "1:71256529635:web:d62921678530fdce7303d6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'mkh_clinic_data');

var docPINs = {"1001":"Dr. Rehan","1002":"Dr. Ramy","1003":"Dr. Badawy","1004":"Dr. Sharkawy","1005":"Dr. Mostafa","1006":"Dr. Ibrahim","1007":"Dr. Hadad","1008":"Dr. Emara","1009":"Dr. Rahim","1010":"Dr. Mamdouh","1011":"Dr. Slam","1012":"Dr. Ezz","1013":"Dr. R Gamal","1014":"Dr. Moghl","1015":"Dr. Darwish","1016":"Dr. Omar","1017":"Dr. Sajid","1018":"Dr. Hamza","1019":"Dr. Eyad","1020":"Dr. Mongy","1021":"Dr. Bahlol"};
var CL=[{d:"Hisham",r:"Room 10",days:["Sun"]},{d:"Farag",r:"Room 8",days:["Mon"]},{d:"Ibrahim",r:"Room 10",days:["Tue"]},{d:"Hany",r:"Room 16",days:["Sun"]},{d:"Fahd",r:"Room 24",days:["Mon"]},{d:"Ali",r:"Room 11",days:["Wed"]},{d:"Nazanin",r:"Room 25",days:["Sun"]},{d:"Arab",r:"Room 25",days:["Tue"]},{d:"Ehab",r:"Room 25",days:["Mon"]},{d:"Maged",r:"Room 20",days:["Sun"]},{d:"Fawzy",r:"Room 20",days:["Wed"]},{d:"Ashraf",r:"Room 20",days:["Thu"]},{d:"Akmal",r:"Room 10",days:["Mon"]},{d:"Zaher",r:"Room 20",days:["Tue"]},{d:"Shafie",r:"Room 25",days:["Thu"]},{d:"Hisham",r:"Room 8",days:["Tue"]},{d:"Farag",r:"Room 10",days:["Wed"]},{d:"Ibrahim",r:"Room 13",days:["Thu"]},{d:"Maged",r:"Room 11",days:["Tue"]}];
window.S={ptr:0,logs:[],oplogs:[]};
var adm=false; var clk=false;

onValue(dbRef, (snap) => {
  const d = snap.val(); if(d) { window.S = d; if(!window.S.logs)window.S.logs=[]; if(!window.S.oplogs)window.S.oplogs=[]; }
  document.getElementById("syncDot").style.background="#34d399"; document.getElementById("syncText").textContent="Live — Synced";
  rAll();
});

function tn(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()]}
function nt(){return new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
function nd(){return new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})}

function smartIdx(){
  var cnt=new Array(CL.length).fill(0);
  (window.S.logs||[]).concat(window.S.oplogs||[]).forEach(e=>{if(e.si!=null)cnt[e.si]++});
  var min = Math.min(...cnt);
  for(var o=0;o<CL.length;o++){var i=(window.S.ptr+o)%CL.length;if(cnt[i]===min)return i}
  return window.S.ptr % CL.length;
}

window.goTab = function(id,btn){
  document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.getElementById("pg-"+id).classList.add("on"); btn.classList.add("on");
  rAll();
};

window.doAssign = function(){
  var fn=document.getElementById("fi").value; var pin=document.getElementById("rpin").value;
  if(!/^\d{6}$/.test(fn)||!docPINs[pin]) return alert("Check File/PIN");
  if(!confirm("Assign File "+fn+" to "+docPINs[pin]+"?")) return;
  var i=smartIdx(), c=CL[i];
  window.S.logs.push({fn:fn,reg:docPINs[pin],doc:c.d,room:c.r,si:i,ad:nd(),time:nt(),ts:Date.now()});
  window.S.ptr++; set(dbRef, window.S);
  document.getElementById("fi").value=""; document.getElementById("rpin").value="";
  alert("Assigned to Dr. "+c.d); rAll();
};

window.doOpAssign = function(){
  var fn=document.getElementById("opfi").value; if(!/^\d{6}$/.test(fn)) return alert("Check File");
  var tc=CL.map((c,i)=>({...c,i})).filter(c=>c.days.includes(tn()));
  if(!tc.length) return alert("No clinics today");
  var best=tc.reduce((a,b)=> (cCnt(a.i) < cCnt(b.i) ? a : b));
  window.S.oplogs.push({fn:fn,clerk:"Clerk",doc:best.d,room:best.r,si:best.i,ad:nd(),time:nt(),ts:Date.now()});
  set(dbRef, window.S); document.getElementById("opfi").value=""; alert("Assigned to Dr. "+best.d); rAll();
};

function cCnt(i){ return (window.S.logs||[]).concat(window.S.oplogs||[]).filter(e=>e.si===i).length; }

function rDist(){
  var g=document.getElementById("dg"); g.innerHTML="";
  CL.forEach((c,i)=>{
    var d=document.createElement("div"); d.className="dc"+(i===smartIdx()?" nx":"");
    d.innerHTML=`<div class="dd">Dr. ${c.d}</div><div style="font-size:10px;color:var(--dim)">${c.r}</div><div class="dn2">${cCnt(i)}</div>`;
    d.onclick=()=>openMo(i); g.appendChild(d);
  });
}

function rLog(){
  var b=document.getElementById("lb"); b.innerHTML="";
  var combined = (window.S.logs||[]).concat(window.S.oplogs||[]).sort((a,b)=>b.ts-a.ts).slice(0,20);
  combined.forEach(x=>{
    var r=document.createElement("div"); r.className="lr";
    r.innerHTML=`<div style="font-size:10px">${x.ad}</div><div>${x.fn}</div><div>${x.room}</div><div style="font-size:10px">${x.reg||"Clerk"}</div>`;
    b.appendChild(r);
  });
}

function openMo(i){
  if(!adm) return alert("Admin login required to view lists or print.");
  var c=CL[i]; var pts=(window.S.logs||[]).concat(window.S.oplogs||[]).filter(e=>e.si===i);
  document.getElementById("mt").textContent="Dr. "+c.d;
  document.getElementById("mc2").textContent=pts.length+" patients total";
  var b=document.getElementById("mbody"); b.innerHTML="";
  pts.forEach(p=>{
    var d=document.createElement("div"); d.className="mr";
    d.innerHTML=`<div><b>${p.fn}</b></div><div style="text-align:right">${p.time}</div>`;
    b.appendChild(d);
  });
  var pb=document.getElementById("mprint"); pb.innerHTML="";
  var btn=document.createElement("button"); btn.className="btn"; btn.textContent="Print Clinic List";
  btn.onclick=()=>exportPDF(c.d+" - "+c.r, pts); pb.appendChild(btn);
  document.getElementById("mo").classList.add("on");
}
window.closeMo = function(){document.getElementById("mo").classList.remove("on")};

window.clerkLogin = function(){ if(document.getElementById("opi").value==="2026"){clk=true; document.getElementById("opgate").style.display="none"; document.getElementById("opc").style.display="block";}};
window.adminLogin = function(){ if(document.getElementById("api").value==="2025"){adm=true; document.getElementById("apgate").style.display="none"; document.getElementById("ac2").style.display="block"; rAll();}};

window.exportWeekly = function(){ exportPDF("Weekly General Report", (window.S.logs||[]).concat(window.S.oplogs||[])); };

function exportPDF(title, data){
  var rows = data.map(e=> `<tr><td>${e.ad}</td><td>${e.time}</td><td>${e.fn}</td><td>${e.doc}</td><td>${e.room}</td><td>${e.reg||"Clerk"}</td></tr>`).join("");
  var h = `<html><head><style>table{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:12px}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#f4f4f4}</style></head>
  <body><h2 style="font-family:sans-serif">${title}</h2><table><thead><tr><th>Date</th><th>Time</th><th>File</th><th>Doctor</th><th>Room</th><th>By</th></tr></thead><tbody>${rows}</tbody></table>
  <script>window.onload=function(){window.print();window.close();}<\/script></body></html>`;
  var w=window.open("","_blank"); w.document.write(h); w.document.close();
}

window.resetAll = function(){ if(confirm("Wipe everything?")) { window.S={ptr:0,logs:[],oplogs:[]}; set(dbRef, window.S); alert("Done"); rAll(); }};

function rAll(){
  document.getElementById("dayName").textContent=tn(); document.getElementById("dateStr").textContent=nd();
  var i=smartIdx(); document.getElementById("nd").textContent="Dr. "+CL[i].d; document.getElementById("nr").textContent=CL[i].r;
  var b=document.getElementById("rb"); b.innerHTML=""; CL.forEach((_,idx)=>{ var d=document.createElement("div"); d.className="dot"+(idx===i?" on":""); b.appendChild(d); });
  rLog(); rDist();
  // Update Outpatient display
  var tc=CL.map((c,idx)=>({...c,idx})).filter(c=>c.days.includes(tn()));
  if(tc.length){
    var best=tc.reduce((a,b)=> (cCnt(a.idx) < cCnt(b.idx) ? a : b));
    document.getElementById("opd").textContent="Dr. "+best.d; document.getElementById("opr").textContent=best.r;
  }
}
</script>
</body>
</html>
